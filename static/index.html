<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧旅游实时流量监控看板 2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #00d2ff;
            --secondary-blue: #3a7bd5;
            --dark-bg: #0a0a1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --success-color: #00ff88;
            --warning-color: #ffaa00;
            --danger-color: #ff4444;
            --purple-glow: #8b5cf6;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0f1628 100%);
            min-height: 100vh;
            color: #ffffff;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(0, 210, 255, 0.1));
            border-radius: 15px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.2), inset 0 0 20px rgba(0, 210, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .auth-controls {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.4);
        }

        .user-info .username {
            color: #ffffff;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-info .role {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(0, 210, 255, 0.2);
            color: #00d2ff;
        }

        .btn-auth {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-login {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 210, 255, 0.5);
        }

        .btn-logout {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.4);
        }

        .btn-logout:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 26, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, rgba(30, 30, 60, 0.95), rgba(20, 20, 40, 0.95));
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: 0 20px 60px rgba(139, 92, 246, 0.3);
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00d2ff, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            background: rgba(10, 10, 26, 0.8);
            color: #ffffff;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .form-actions .btn {
            flex: 1;
            padding: 14px;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .switch-auth {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .switch-auth a {
            color: #00d2ff;
            text-decoration: none;
            cursor: pointer;
        }

        .switch-auth a:hover {
            text-decoration: underline;
        }

        .toast-success {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.9), rgba(0, 200, 100, 0.9)) !important;
            border-color: rgba(0, 255, 136, 0.4) !important;
        }

        .user-management-section {
            display: none;
            margin-top: 30px;
        }

        .user-management-section.active {
            display: block;
        }

        .user-table-container {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .user-table-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff006e, #8b5cf6, #00d2ff);
        }

        .user-table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .user-table-header h3 {
            font-size: 1.4rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-table-header h3::before {
            content: '';
            width: 5px;
            height: 28px;
            background: linear-gradient(180deg, #ff006e, #8b5cf6);
            border-radius: 3px;
        }

        .btn-refresh-users {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh-users:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.5);
        }

        .btn-toggle-status {
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-toggle-status.active {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.4);
        }

        .btn-toggle-status.active:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        .btn-toggle-status.inactive {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.4);
        }

        .btn-toggle-status.inactive:hover {
            background: rgba(0, 255, 136, 0.3);
        }

        .btn-toggle-status:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .role-select {
            padding: 8px 12px;
            font-size: 0.85rem;
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            background: rgba(10, 10, 26, 0.8);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .role-select option {
            background: rgba(10, 10, 26, 0.95);
            color: #ffffff;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-badge.active {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.4);
        }

        .status-badge.inactive {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.4);
        }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .role-badge.admin {
            background: rgba(255, 0, 110, 0.2);
            color: #ff006e;
            border: 1px solid rgba(255, 0, 110, 0.4);
        }

        .role-badge.staff {
            background: rgba(139, 92, 246, 0.2);
            color: #8b5cf6;
            border: 1px solid rgba(139, 92, 246, 0.4);
        }

        .role-badge.tourist {
            background: rgba(0, 210, 255, 0.2);
            color: #00d2ff;
            border: 1px solid rgba(0, 210, 255, 0.4);
        }

        .welcome-text {
            position: absolute;
            top: 15px;
            left: 20px;
            padding: 8px 16px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .welcome-text .role-label {
            margin-left: 8px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            background: rgba(0, 210, 255, 0.2);
            color: #00d2ff;
        }

        .welcome-text .role-label.admin {
            background: rgba(255, 0, 110, 0.2);
            color: #ff006e;
        }

        .welcome-text .role-label.staff {
            background: rgba(139, 92, 246, 0.2);
            color: #8b5cf6;
        }

        .user-table .action-cell {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .user-table .action-cell {
                flex-direction: column;
                gap: 5px;
            }

            .welcome-text {
                position: static;
                margin-bottom: 10px;
                display: inline-block;
            }
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-blue), transparent);
            animation: scanLine 3s linear infinite;
        }

        @keyframes scanLine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d2ff, #8b5cf6, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(139, 92, 246, 0.5);
            letter-spacing: 6px;
            position: relative;
        }

        .header .subtitle {
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .header .version-tag {
            position: absolute;
            top: 15px;
            right: 20px;
            padding: 5px 15px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .control-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-group label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        .input-group input {
            padding: 14px 24px;
            font-size: 1rem;
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            background: rgba(10, 10, 26, 0.8);
            color: #ffffff;
            width: 220px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.4), inset 0 0 15px rgba(0, 210, 255, 0.1);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn {
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 210, 255, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-refresh {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(139, 92, 246, 0.6);
        }

        .btn-refresh:active {
            transform: translateY(0);
        }

        .refresh-icon {
            font-size: 1.2rem;
            transition: transform 0.6s ease;
        }

        .btn-refresh.rotating .refresh-icon {
            animation: spin 0.6s linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .auto-refresh-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 25px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .auto-refresh-indicator .dot {
            width: 8px;
            height: 8px;
            background: var(--success-color);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .auto-refresh-indicator span {
            font-size: 0.9rem;
            color: var(--success-color);
        }

        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-blue), var(--purple-glow));
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(139, 92, 246, 0.4);
        }

        .card-title {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .card-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
        }

        .card-icon {
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        .spot-info .card-value {
            background: linear-gradient(90deg, #00d2ff, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .average-count .card-value {
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .congestion-level {
            text-align: center;
        }

        .congestion-level .card-value {
            font-size: 2.8rem;
        }

        .congestion-level.comfort {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 255, 136, 0.05));
            border-color: rgba(0, 255, 136, 0.4);
        }

        .congestion-level.comfort .card-value {
            color: var(--success-color);
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
            animation: glow-green 2s infinite;
        }

        @keyframes glow-green {
            0%, 100% { text-shadow: 0 0 20px rgba(0, 255, 136, 0.8), 0 0 40px rgba(0, 255, 136, 0.4); }
            50% { text-shadow: 0 0 40px rgba(0, 255, 136, 1), 0 0 60px rgba(0, 255, 136, 0.6); }
        }

        .congestion-level.normal {
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.15), rgba(255, 170, 0, 0.05));
            border-color: rgba(255, 170, 0, 0.4);
        }

        .congestion-level.normal .card-value {
            color: var(--warning-color);
            text-shadow: 0 0 30px rgba(255, 170, 0, 0.8);
            animation: glow-yellow 2s infinite;
        }

        @keyframes glow-yellow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 170, 0, 0.8), 0 0 40px rgba(255, 170, 0, 0.4); }
            50% { text-shadow: 0 0 40px rgba(255, 170, 0, 1), 0 0 60px rgba(255, 170, 0, 0.6); }
        }

        .congestion-level.crowded {
            background: linear-gradient(135deg, rgba(255, 68, 68, 0.15), rgba(255, 68, 68, 0.05));
            border-color: rgba(255, 68, 68, 0.4);
        }

        .congestion-level.crowded .card-value {
            color: var(--danger-color);
            text-shadow: 0 0 30px rgba(255, 68, 68, 0.8);
            animation: blink-red 1s infinite;
        }

        @keyframes blink-red {
            0%, 50% { 
                text-shadow: 0 0 20px rgba(255, 68, 68, 0.8), 0 0 40px rgba(255, 68, 68, 0.4);
                opacity: 1;
            }
            51%, 100% { 
                text-shadow: 0 0 10px rgba(255, 68, 68, 0.4);
                opacity: 0.7;
            }
        }

        .trend-card {
            text-align: center;
        }

        .trend-card .card-value {
            font-size: 3.5rem;
        }

        .trend-up {
            color: var(--danger-color);
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.6);
        }

        .trend-down {
            color: var(--success-color);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
        }

        .trend-stable {
            color: #6b7280;
        }

        .trend-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .inventory-warning {
            color: #ff6b35;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.8);
            animation: blink-orange 0.8s infinite;
        }

        @keyframes blink-orange {
            0%, 50% { 
                text-shadow: 0 0 20px rgba(255, 107, 53, 0.8), 0 0 40px rgba(255, 107, 53, 0.4);
                opacity: 1;
            }
            51%, 100% { 
                text-shadow: 0 0 10px rgba(255, 107, 53, 0.4);
                opacity: 0.7;
            }
        }

        .inventory-note {
            font-size: 0.85rem;
            color: #ff6b35;
            margin-top: 8px;
            padding: 5px 10px;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 5px;
            border: 1px solid rgba(255, 107, 53, 0.3);
        }

        .news-ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(90deg, rgba(139, 92, 246, 0.95), rgba(0, 210, 255, 0.95));
            padding: 12px 0;
            z-index: 1000;
            overflow: hidden;
            box-shadow: 0 -4px 20px rgba(139, 92, 246, 0.4);
        }

        .news-ticker::before {
            content: '🎫 实时播报';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.8), transparent);
            padding: 12px 30px 12px 20px;
            color: #ffffff;
            font-weight: 600;
            z-index: 10;
            display: flex;
            align-items: center;
        }

        .news-ticker-content {
            display: flex;
            animation: ticker-scroll 30s linear infinite;
            white-space: nowrap;
            padding-left: 150px;
        }

        .news-ticker:hover .news-ticker-content {
            animation-play-state: paused;
        }

        .news-item {
            display: inline-flex;
            align-items: center;
            padding: 0 50px;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .news-item::before {
            content: '🎉';
            margin-right: 10px;
            font-size: 1.2rem;
        }

        @keyframes ticker-scroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .dashboard {
            padding-bottom: 80px;
        }

        .chart-section {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border-radius: 15px;
            padding: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .chart-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--purple-glow), var(--primary-blue), var(--purple-glow));
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            width: 5px;
            height: 28px;
            background: linear-gradient(180deg, var(--primary-blue), var(--purple-glow));
            border-radius: 3px;
        }

        .section-title .icon {
            font-size: 1.5rem;
        }

        #trafficChart {
            width: 100%;
            height: 400px;
        }

        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .legend-color {
            width: 20px;
            height: 4px;
            border-radius: 2px;
        }

        .legend-color.entry {
            background: linear-gradient(90deg, #00d2ff, #8b5cf6);
        }

        .records-section {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border-radius: 15px;
            padding: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .records-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #8b5cf6, #ff006e);
        }

        .records-table {
            width: 100%;
            border-collapse: collapse;
        }

        .records-table th,
        .records-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .records-table th {
            background: rgba(139, 92, 246, 0.1);
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .records-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .records-table td {
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state .icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .empty-state p {
            font-size: 1.3rem;
        }

        .empty-state .hint {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 10px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 60px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .loading p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 18px 28px;
            background: linear-gradient(135deg, rgba(255, 68, 68, 0.9), rgba(255, 68, 68, 0.8));
            color: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(255, 68, 68, 0.4);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast .toast-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .toast .toast-message {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }

            .control-panel {
                flex-direction: column;
                padding: 15px;
            }

            .input-group {
                flex-direction: column;
                width: 100%;
            }

            .input-group input {
                width: 100%;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 20px;
            }

            .card-value {
                font-size: 2rem;
            }

            .records-table {
                display: block;
                overflow-x: auto;
            }

            #trafficChart {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="version-tag">v2.0 动态版</span>
            <div class="welcome-text" id="welcomeText" style="display: none;">
                欢迎，<span id="welcomeUsername">-</span>
                <span class="role-label" id="welcomeRole">-</span>
            </div>
            <div class="auth-controls" id="authControls">
                <button class="btn-auth btn-login" id="loginBtn">登录</button>
            </div>
            <h1>智慧旅游实时流量监控看板</h1>
            <p class="subtitle">实时监控景区人流量，智能分析拥堵状况 | 5秒自动刷新</p>
        </div>

        <div class="modal-overlay" id="loginModal">
            <div class="modal">
                <h2 class="modal-title" id="modalTitle">用户登录</h2>
                <form id="authForm">
                    <div class="form-group" id="registerRoleGroup" style="display: none;">
                        <label for="role">角色</label>
                        <select id="role" name="role">
                            <option value="TOURIST">游客 (TOURIST)</option>
                            <option value="STAFF">员工 (STAFF)</option>
                            <option value="ADMIN">管理员 (ADMIN)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" placeholder="请输入密码" required>
                    </div>
                    <div class="form-group" id="registerPhoneGroup" style="display: none;">
                        <label for="phone">手机号 (可选)</label>
                        <input type="text" id="phone" name="phone" placeholder="请输入手机号">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-cancel" id="cancelBtn">取消</button>
                        <button type="submit" class="btn btn-primary" id="submitBtn">登录</button>
                    </div>
                    <div class="switch-auth">
                        <span id="switchText">还没有账号？</span>
                        <a id="switchLink">立即注册</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="control-panel">
            <div class="input-group">
                <label for="spotId">景点 ID:</label>
                <input type="number" id="spotId" placeholder="请输入景点 ID (如: 1)" min="1">
            </div>
            <button class="btn btn-primary" id="fetchBtn">获取实时分析</button>
            <button class="btn btn-refresh" id="refreshBtn" disabled>
                <span class="refresh-icon">🔄</span>
                立即刷新
            </button>
            <div class="auto-refresh-indicator" id="autoIndicator" style="display: none;">
                <div class="dot"></div>
                <span>自动刷新中: 5秒</span>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在加载数据...</p>
        </div>

        <div class="empty-state" id="emptyState">
            <div class="icon">📊</div>
            <p>请输入景点 ID 并点击"获取实时分析"查看数据</p>
            <p class="hint">示例: 输入 1 查看第一个景点的数据</p>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="cards-grid">
                <div class="card spot-info">
                    <div class="card-icon">🏞️</div>
                    <div class="card-title">景点名称</div>
                    <div class="card-value" id="spotName">-</div>
                </div>

                <div class="card average-count">
                    <div class="card-icon">👥</div>
                    <div class="card-title">当前平均人数</div>
                    <div class="card-value" id="averageCount">0</div>
                </div>

                <div class="card" id="inventoryCard">
                    <div class="card-icon">🎫</div>
                    <div class="card-title">剩余门票</div>
                    <div class="card-value" id="remainedInventory">-</div>
                    <div class="inventory-note" id="inventoryNote" style="display: none;"></div>
                </div>

                <div class="card congestion-level" id="congestionCard">
                    <div class="card-icon">🚦</div>
                    <div class="card-title">拥堵等级</div>
                    <div class="card-value" id="congestionLevel">-</div>
                </div>

                <div class="card trend-card" id="trendCard">
                    <div class="card-icon">📈</div>
                    <div class="card-title">流量趋势</div>
                    <div class="card-value" id="trendValue">→</div>
                    <div class="trend-label" id="trendLabel">-</div>
                </div>
            </div>

            <div class="chart-section">
                <h3 class="section-title">
                    <span class="icon">📈</span>
                    实时流量走势图
                </h3>
                <div id="trafficChart"></div>
                <div class="chart-legend">
                    <div class="legend-item">
                        <div class="legend-color entry"></div>
                        <span>入园人数</span>
                    </div>
                </div>
            </div>

            <div class="records-section">
                <h3 class="section-title">
                    <span class="icon">📋</span>
                    最近流量记录
                </h3>
                <table class="records-table" id="recordsTable">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>记录时间</th>
                            <th>入园人数</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="user-management-section" id="userManagementSection">
            <div class="user-table-container">
                <div class="user-table-header">
                    <h3>用户管理</h3>
                    <button class="btn-refresh-users" id="refreshUsersBtn">
                        <span class="refresh-icon">🔄</span>
                        刷新列表
                    </button>
                </div>
                <table class="records-table user-table" id="usersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>角色</th>
                            <th>状态</th>
                            <th>手机号</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <div class="toast-title">错误</div>
        <div class="toast-message" id="toastMessage">-</div>
    </div>

    <div class="news-ticker" id="newsTicker" style="display: none;">
        <div class="news-ticker-content" id="newsTickerContent">
        </div>
    </div>

    <script>
        const spotIdInput = document.getElementById('spotId');
        const fetchBtn = document.getElementById('fetchBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const loading = document.getElementById('loading');
        const emptyState = document.getElementById('emptyState');
        const dashboard = document.getElementById('dashboard');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const autoIndicator = document.getElementById('autoIndicator');

        let trafficChart = null;
        let autoRefreshTimer = null;
        let currentSpotId = null;

        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function updateCongestionCard(level) {
            const card = document.getElementById('congestionCard');
            const levelElement = document.getElementById('congestionLevel');
            
            card.classList.remove('comfort', 'normal', 'crowded');
            levelElement.textContent = level;

            if (level === '舒适') {
                card.classList.add('comfort');
            } else if (level === '正常') {
                card.classList.add('normal');
            } else if (level === '拥挤') {
                card.classList.add('crowded');
            }
        }

        function updateTrendCard(trend) {
            const trendValue = document.getElementById('trendValue');
            const trendLabel = document.getElementById('trendLabel');
            
            trendLabel.textContent = trend;

            if (trend === '上升') {
                trendValue.textContent = '↑';
                trendValue.className = 'card-value trend-up';
            } else if (trend === '下降') {
                trendValue.textContent = '↓';
                trendValue.className = 'card-value trend-down';
            } else {
                trendValue.textContent = '→';
                trendValue.className = 'card-value trend-stable';
            }
        }

        function updateRecordsTable(records) {
            const tbody = document.getElementById('recordsBody');
            tbody.innerHTML = '';

            if (!records || records.length === 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td colspan="3" style="text-align: center; color: rgba(255, 255, 255, 0.5); padding: 30px;">
                        暂无流量记录
                    </td>
                `;
                tbody.appendChild(tr);
                return;
            }

            records.forEach((record, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${record.time}</td>
                    <td>${record.entry_count}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function initChart() {
            const chartDom = document.getElementById('trafficChart');
            trafficChart = echarts.init(chartDom);
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(10, 10, 26, 0.9)',
                    borderColor: 'rgba(139, 92, 246, 0.5)',
                    borderWidth: 1,
                    textStyle: {
                        color: '#ffffff'
                    },
                    axisPointer: {
                        type: 'cross',
                        label: {
                            backgroundColor: 'rgba(139, 92, 246, 0.8)'
                        }
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: [],
                    axisLine: {
                        lineStyle: {
                            color: 'rgba(255, 255, 255, 0.2)'
                        }
                    },
                    axisLabel: {
                        color: 'rgba(255, 255, 255, 0.7)',
                        fontSize: 12
                    },
                    splitLine: {
                        lineStyle: {
                            color: 'rgba(255, 255, 255, 0.05)'
                        }
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '入园人数',
                    axisLine: {
                        lineStyle: {
                            color: 'rgba(255, 255, 255, 0.2)'
                        }
                    },
                    axisLabel: {
                        color: 'rgba(255, 255, 255, 0.7)',
                        fontSize: 12
                    },
                    splitLine: {
                        lineStyle: {
                            color: 'rgba(255, 255, 255, 0.05)',
                            type: 'dashed'
                        }
                    },
                    nameTextStyle: {
                        color: 'rgba(255, 255, 255, 0.6)',
                        fontSize: 12
                    }
                },
                series: [{
                    name: '入园人数',
                    type: 'line',
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 8,
                    lineStyle: {
                        color: {
                            type: 'linear',
                            x: 0,
                            y: 0,
                            x2: 1,
                            y2: 0,
                            colorStops: [{
                                offset: 0, color: '#00d2ff'
                            }, {
                                offset: 1, color: '#8b5cf6'
                            }]
                        },
                        width: 3
                    },
                    itemStyle: {
                        color: '#00d2ff',
                        borderColor: '#8b5cf6',
                        borderWidth: 2
                    },
                    areaStyle: {
                        color: {
                            type: 'linear',
                            x: 0,
                            y: 0,
                            x2: 0,
                            y2: 1,
                            colorStops: [{
                                offset: 0, color: 'rgba(0, 210, 255, 0.3)'
                            }, {
                                offset: 1, color: 'rgba(139, 92, 246, 0.05)'
                            }]
                        }
                    },
                    emphasis: {
                        itemStyle: {
                            color: '#ff006e',
                            borderColor: '#ff006e',
                            borderWidth: 3
                        }
                    },
                    data: []
                }]
            };

            trafficChart.setOption(option);

            window.addEventListener('resize', () => {
                trafficChart.resize();
            });
        }

        function updateChart(times, values) {
            if (!trafficChart) {
                initChart();
            }

            trafficChart.setOption({
                xAxis: {
                    data: times
                },
                series: [{
                    data: values
                }]
            });
        }

        function startAutoRefresh() {
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
            }
            
            autoIndicator.style.display = 'flex';
            
            autoRefreshTimer = setInterval(() => {
                if (currentSpotId) {
                    fetchData(true);
                }
            }, 5000);
        }

        function stopAutoRefresh() {
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
                autoRefreshTimer = null;
            }
            autoIndicator.style.display = 'none';
        }

        let currentUser = null;
        let isLoginMode = true;

        function getAuthToken() {
            return localStorage.getItem('auth_token');
        }

        function setAuthToken(token) {
            localStorage.setItem('auth_token', token);
        }

        function clearAuthToken() {
            localStorage.removeItem('auth_token');
        }

        function getAuthHeaders() {
            const token = getAuthToken();
            const headers = {
                'Content-Type': 'application/json'
            };
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            return headers;
        }

        function updateAuthUI() {
            const authControls = document.getElementById('authControls');
            const welcomeText = document.getElementById('welcomeText');
            const welcomeUsername = document.getElementById('welcomeUsername');
            const welcomeRole = document.getElementById('welcomeRole');
            const userManagementSection = document.getElementById('userManagementSection');
            const token = getAuthToken();
            
            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    const username = payload.sub;
                    const role = payload.role;
                    
                    authControls.innerHTML = `
                        <div class="user-info">
                            <span class="username">${username}</span>
                            <span class="role">${role}</span>
                        </div>
                        <button class="btn-auth btn-logout" id="logoutBtn">登出</button>
                    `;
                    
                    welcomeText.style.display = 'block';
                    welcomeUsername.textContent = username;
                    welcomeRole.textContent = role;
                    welcomeRole.className = 'role-label';
                    welcomeRole.classList.add(role.toLowerCase());
                    
                    if (role === 'ADMIN') {
                        userManagementSection.classList.add('active');
                        loadUsers();
                    } else {
                        userManagementSection.classList.remove('active');
                    }
                    
                    document.getElementById('logoutBtn').addEventListener('click', handleLogout);
                    currentUser = { username, role };
                } catch (e) {
                    clearAuthToken();
                    showLoginButton();
                }
            } else {
                showLoginButton();
                welcomeText.style.display = 'none';
                userManagementSection.classList.remove('active');
                currentUser = null;
            }
        }

        function showLoginButton() {
            const authControls = document.getElementById('authControls');
            authControls.innerHTML = `
                <button class="btn-auth btn-login" id="loginBtn">登录</button>
            `;
            document.getElementById('loginBtn').addEventListener('click', openLoginModal);
        }

        function openLoginModal() {
            isLoginMode = true;
            updateModalUI();
            document.getElementById('loginModal').classList.add('active');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('authForm').reset();
        }

        function updateModalUI() {
            const modalTitle = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('submitBtn');
            const switchText = document.getElementById('switchText');
            const switchLink = document.getElementById('switchLink');
            const registerRoleGroup = document.getElementById('registerRoleGroup');
            const registerPhoneGroup = document.getElementById('registerPhoneGroup');

            if (isLoginMode) {
                modalTitle.textContent = '用户登录';
                submitBtn.textContent = '登录';
                switchText.textContent = '还没有账号？';
                switchLink.textContent = '立即注册';
                registerRoleGroup.style.display = 'none';
                registerPhoneGroup.style.display = 'none';
            } else {
                modalTitle.textContent = '用户注册';
                submitBtn.textContent = '注册';
                switchText.textContent = '已有账号？';
                switchLink.textContent = '立即登录';
                registerRoleGroup.style.display = 'block';
                registerPhoneGroup.style.display = 'block';
            }
        }

        function showSuccessToast(message) {
            toast.classList.add('toast-success');
            showToast(message);
            setTimeout(() => {
                toast.classList.remove('toast-success');
            }, 3000);
        }

        function formatValidationError(errorData) {
            let errorMessage = '请求失败';
            
            if (errorData.detail) {
                if (Array.isArray(errorData.detail)) {
                    const errors = errorData.detail.map(err => {
                        const field = err.loc ? err.loc.slice(1).join('.') : '未知字段';
                        return `[${field}]: ${err.msg}`;
                    });
                    errorMessage = '字段验证错误: ' + errors.join('; ');
                } else {
                    errorMessage = errorData.detail;
                }
            } else if (errorData.msg) {
                errorMessage = errorData.msg;
            }

            return errorMessage;
        }

        async function handleLogin(username, password) {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(formatValidationError(errorData));
            }

            return await response.json();
        }

        async function handleRegister(username, password, role, phone) {
            const body = { 
                username, 
                password,
                role: role || 'TOURIST'
            };
            if (phone && phone.trim() !== '') {
                body.phone = phone.trim();
            }

            const response = await fetch('/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(formatValidationError(errorData));
            }

            return await response.json();
        }

        function handleLogout() {
            clearAuthToken();
            updateAuthUI();
            showSuccessToast('已登出');
            stopAutoRefresh();
            dashboard.classList.remove('active');
            emptyState.style.display = 'block';
            refreshBtn.disabled = true;
            currentSpotId = null;
        }

        async function fetchTrafficSeries(spotId) {
            const response = await fetch(`/analytics/traffic-series?spot_id=${spotId}`, {
                headers: getAuthHeaders()
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                if (response.status === 401) {
                    clearAuthToken();
                    updateAuthUI();
                    throw new Error('请先登录');
                }
                throw new Error(errorData.detail || '获取流量数据失败');
            }

            return await response.json();
        }

        async function fetchAnalytics(spotId) {
            const response = await fetch(`/traffic/analytics/${spotId}`);
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || '获取分析数据失败');
            }

            return await response.json();
        }

        async function fetchScenicSpot(spotId) {
            const response = await fetch(`/scenic-spots/${spotId}`);
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || '获取景点信息失败');
            }

            return await response.json();
        }

        async function fetchRecentSuccessOrders() {
            const response = await fetch('/tickets/recent-success?limit=5');
            
            if (!response.ok) {
                return [];
            }

            return await response.json();
        }

        function updateInventoryCard(spotData) {
            const remainedInventoryEl = document.getElementById('remainedInventory');
            const inventoryNoteEl = document.getElementById('inventoryNote');
            
            remainedInventoryEl.textContent = spotData.remained_inventory;
            
            remainedInventoryEl.classList.remove('inventory-warning');
            
            if (spotData.status_note) {
                remainedInventoryEl.classList.add('inventory-warning');
                inventoryNoteEl.textContent = spotData.status_note;
                inventoryNoteEl.style.display = 'block';
            } else {
                inventoryNoteEl.style.display = 'none';
            }
        }

        function updateNewsTicker(orders) {
            const newsTicker = document.getElementById('newsTicker');
            const newsTickerContent = document.getElementById('newsTickerContent');
            
            if (!orders || orders.length === 0) {
                newsTicker.style.display = 'none';
                return;
            }
            
            newsTicker.style.display = 'block';
            
            let html = '';
            orders.forEach(order => {
                const message = `${order.time_ago}，${order.tourist_name} 在【${order.scenic_spot_name}】成功购票 ${order.quantity} 张`;
                html += `<span class="news-item">${message}</span>`;
            });
            
            newsTickerContent.innerHTML = html + html;
        }

        async function loadNewsTicker() {
            try {
                const orders = await fetchRecentSuccessOrders();
                updateNewsTicker(orders);
            } catch (error) {
                console.error('Error loading news ticker:', error);
            }
        }

        async function fetchData(isAutoRefresh = false) {
            const spotId = currentSpotId || spotIdInput.value.trim();
            
            if (!spotId) {
                showToast('请输入景点 ID');
                return;
            }

            if (spotId < 1) {
                showToast('景点 ID 必须大于 0');
                return;
            }

            if (!isAutoRefresh) {
                loading.classList.add('active');
            }
            
            emptyState.style.display = 'none';
            
            try {
                const [trafficSeriesData, analyticsData, spotData] = await Promise.all([
                    fetchTrafficSeries(spotId),
                    fetchAnalytics(spotId),
                    fetchScenicSpot(spotId)
                ]);

                currentSpotId = spotId;
                
                document.getElementById('spotName').textContent = analyticsData.scenic_spot_name;
                document.getElementById('averageCount').textContent = analyticsData.average_entry_count;
                
                updateInventoryCard(spotData);
                updateCongestionCard(analyticsData.congestion_level);
                updateTrendCard(analyticsData.trend);
                updateRecordsTable(trafficSeriesData.records);
                updateChart(trafficSeriesData.times, trafficSeriesData.values);

                if (!isAutoRefresh) {
                    dashboard.classList.add('active');
                    refreshBtn.disabled = false;
                    startAutoRefresh();
                    loadNewsTicker();
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                showToast(error.message || '网络错误，请稍后重试');
            } finally {
                if (!isAutoRefresh) {
                    loading.classList.remove('active');
                }
            }
        }

        fetchBtn.addEventListener('click', () => fetchData(false));
        spotIdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchData(false);
            }
        });

        refreshBtn.addEventListener('click', () => {
            refreshBtn.classList.add('rotating');
            fetchData(false).then(() => {
                setTimeout(() => {
                    refreshBtn.classList.remove('rotating');
                }, 600);
            });
        });

        window.addEventListener('beforeunload', () => {
            stopAutoRefresh();
        });

        document.getElementById('cancelBtn').addEventListener('click', closeLoginModal);
        document.getElementById('switchLink').addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            updateModalUI();
        });

        document.getElementById('loginModal').addEventListener('click', (e) => {
            if (e.target.id === 'loginModal') {
                closeLoginModal();
            }
        });

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const phone = document.getElementById('phone').value.trim();

            try {
                if (isLoginMode) {
                    const result = await handleLogin(username, password);
                    setAuthToken(result.access_token);
                    updateAuthUI();
                    closeLoginModal();
                    showSuccessToast('登录成功');
                } else {
                    await handleRegister(username, password, role, phone || undefined);
                    showSuccessToast('注册成功，请登录');
                    isLoginMode = true;
                    updateModalUI();
                }
            } catch (error) {
                showToast(error.message);
            }
        });

        let currentUserId = null;

        async function getCurrentUserInfo() {
            try {
                const response = await fetch('/auth/me', {
                    headers: getAuthHeaders()
                });
                
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        clearAuthToken();
                        updateAuthUI();
                    }
                    return null;
                }

                const data = await response.json();
                currentUserId = data.id;
                return data;
            } catch (error) {
                console.error('获取当前用户信息失败:', error);
                return null;
            }
        }

        async function fetchUsers() {
            const response = await fetch('/auth/users/list', {
                headers: getAuthHeaders()
            });
            
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                
                if (response.status === 401) {
                    clearAuthToken();
                    updateAuthUI();
                    throw new Error('请先登录');
                }
                
                throw new Error(formatValidationError(errorData));
            }

            return await response.json();
        }

        async function toggleUserStatusApi(userId) {
            const response = await fetch(`/auth/users/${userId}/status`, {
                method: 'PATCH',
                headers: getAuthHeaders()
            });
            
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                
                if (response.status === 401) {
                    clearAuthToken();
                    updateAuthUI();
                    throw new Error('请先登录');
                }
                
                throw new Error(formatValidationError(errorData));
            }

            return await response.json();
        }

        async function updateUserRoleApi(userId, newRole) {
            const response = await fetch(`/auth/users/${userId}/role?new_role=${newRole}`, {
                method: 'PATCH',
                headers: getAuthHeaders()
            });
            
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                
                if (response.status === 401) {
                    clearAuthToken();
                    updateAuthUI();
                    throw new Error('请先登录');
                }
                
                throw new Error(formatValidationError(errorData));
            }

            return await response.json();
        }

        function getRoleBadgeClass(role) {
            switch (role) {
                case 'ADMIN': return 'admin';
                case 'STAFF': return 'staff';
                default: return 'tourist';
            }
        }

        function renderUsersTable(users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            if (!users || users.length === 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td colspan="7" style="text-align: center; color: rgba(255, 255, 255, 0.5); padding: 30px;">
                        暂无用户数据
                    </td>
                `;
                tbody.appendChild(tr);
                return;
            }

            users.forEach(user => {
                const isCurrentUser = currentUserId && currentUserId === user.id;
                const tr = document.createElement('tr');
                const statusBadgeClass = user.is_active ? 'active' : 'inactive';
                const statusText = user.is_active ? '正常' : '禁用';
                const toggleBtnClass = user.is_active ? 'active' : 'inactive';
                const toggleBtnText = user.is_active ? '禁用' : '启用';
                const isDisabled = isCurrentUser ? 'disabled' : '';

                tr.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.username}</td>
                    <td>
                        <select class="role-select" data-user-id="${user.id}" ${isDisabled}>
                            <option value="TOURIST" ${user.role === 'TOURIST' ? 'selected' : ''}>游客 (TOURIST)</option>
                            <option value="STAFF" ${user.role === 'STAFF' ? 'selected' : ''}>员工 (STAFF)</option>
                            <option value="ADMIN" ${user.role === 'ADMIN' ? 'selected' : ''}>管理员 (ADMIN)</option>
                        </select>
                    </td>
                    <td>
                        <span class="status-badge ${statusBadgeClass}">${statusText}</span>
                    </td>
                    <td>${user.phone || '-'}</td>
                    <td>${new Date(user.created_at).toLocaleString('zh-CN')}</td>
                    <td class="action-cell">
                        <button class="btn-toggle-status ${toggleBtnClass}" data-user-id="${user.id}" ${isDisabled}>
                            ${toggleBtnText}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.querySelectorAll('.btn-toggle-status').forEach(btn => {
                btn.addEventListener('click', handleToggleStatus);
            });

            document.querySelectorAll('.role-select').forEach(select => {
                select.addEventListener('change', handleRoleChange);
            });
        }

        async function loadUsers() {
            try {
                await getCurrentUserInfo();
                const users = await fetchUsers();
                renderUsersTable(users);
            } catch (error) {
                showToast(error.message);
            }
        }

        async function handleToggleStatus(e) {
            const userId = parseInt(e.target.dataset.userId);
            
            try {
                await toggleUserStatusApi(userId);
                showSuccessToast('状态已更新');
                await loadUsers();
            } catch (error) {
                showToast(error.message);
            }
        }

        async function handleRoleChange(e) {
            const userId = parseInt(e.target.dataset.userId);
            const newRole = e.target.value;
            
            try {
                await updateUserRoleApi(userId, newRole);
                showSuccessToast('角色已更新');
            } catch (error) {
                showToast(error.message);
                e.target.value = e.target.querySelector('option:checked')?.value || 'TOURIST';
            }
        }

        document.getElementById('refreshUsersBtn').addEventListener('click', () => {
            loadUsers();
        });

        document.addEventListener('DOMContentLoaded', () => {
            updateAuthUI();
        });
    </script>
</body>
</html>
