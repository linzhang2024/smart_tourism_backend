<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全域电子导览与智慧客流管控</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #00d2ff;
            --secondary-blue: #3a7bd5;
            --dark-bg: #0a0a1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --success-color: #00ff88;
            --warning-color: #ffaa00;
            --danger-color: #ff4444;
            --purple-glow: #8b5cf6;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0f1628 100%);
            min-height: 100vh;
            color: #ffffff;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 25px 0;
            margin-bottom: 25px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(0, 210, 255, 0.1));
            border-radius: 15px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.2), inset 0 0 20px rgba(0, 210, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-blue), transparent);
            animation: scanLine 3s linear infinite;
        }

        @keyframes scanLine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d2ff, #8b5cf6, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(139, 92, 246, 0.5);
            letter-spacing: 4px;
            position: relative;
        }

        .header .subtitle {
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        .control-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 210, 255, 0.6);
        }

        .btn-refresh {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
        }

        .auto-refresh-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 25px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .auto-refresh-indicator .dot {
            width: 8px;
            height: 8px;
            background: var(--success-color);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .auto-refresh-indicator span {
            font-size: 0.85rem;
            color: var(--success-color);
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-blue), var(--purple-glow));
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(139, 92, 246, 0.4);
        }

        .stat-card.green::before {
            background: linear-gradient(90deg, #00ff88, #00cc6a);
        }

        .stat-card.yellow::before {
            background: linear-gradient(90deg, #ffaa00, #ff8800);
        }

        .stat-card.red::before {
            background: linear-gradient(90deg, #ff4444, #ff006e);
        }

        .stat-title {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
        }

        .stat-value.green {
            color: var(--success-color);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .stat-value.yellow {
            color: var(--warning-color);
            text-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
        }

        .stat-value.red {
            color: var(--danger-color);
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
            animation: blink-red 1s infinite;
        }

        @keyframes blink-red {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.7; }
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .map-section {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .map-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--purple-glow), var(--primary-blue), var(--purple-glow));
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            width: 5px;
            height: 24px;
            background: linear-gradient(180deg, var(--primary-blue), var(--purple-glow));
            border-radius: 3px;
        }

        #mapChart {
            width: 100%;
            height: 500px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .spots-list-section {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-height: 500px;
            overflow-y: auto;
        }

        .spots-list-section::-webkit-scrollbar {
            width: 6px;
        }

        .spots-list-section::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .spots-list-section::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.5);
            border-radius: 3px;
        }

        .spot-item {
            background: rgba(10, 10, 26, 0.5);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .spot-item:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateX(5px);
        }

        .spot-item:last-child {
            margin-bottom: 0;
        }

        .spot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .spot-name {
            font-weight: 600;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .spot-status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .spot-status-badge.green {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .spot-status-badge.yellow {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
            border: 1px solid rgba(255, 170, 0, 0.3);
        }

        .spot-status-badge.red {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
            animation: pulse-border 1s infinite;
        }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 68, 68, 0.5); }
            50% { box-shadow: 0 0 15px rgba(255, 68, 68, 0.8); }
        }

        .spot-status-badge.suspended {
            background: rgba(128, 128, 128, 0.2);
            color: #888888;
            border: 1px solid rgba(128, 128, 128, 0.3);
        }

        .spot-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .spot-detail-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .spot-detail-label {
            color: rgba(255, 255, 255, 0.4);
        }

        .staff-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            font-size: 0.8rem;
        }

        .staff-indicator .staff-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .staff-indicator .staff-dot.on-duty {
            background: #00ff88;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.8);
        }

        .staff-indicator .staff-dot.off-duty {
            background: #666666;
        }

        .staff-indicator .staff-text {
            color: rgba(255, 255, 255, 0.5);
        }

        .coupon-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 26, 0.9);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .coupon-modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .coupon-modal-content {
            background: linear-gradient(135deg, rgba(30, 30, 60, 0.98), rgba(20, 20, 40, 0.98));
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 2px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.3), inset 0 0 30px rgba(255, 215, 0, 0.05);
            position: relative;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .coupon-modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .coupon-modal-close:hover {
            background: rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }

        .coupon-modal-icon {
            text-align: center;
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .coupon-modal-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .coupon-modal-message {
            text-align: center;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .coupon-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 170, 0, 0.1));
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .coupon-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .coupon-amount {
            text-align: center;
            font-size: 3.5rem;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            margin-bottom: 10px;
        }

        .coupon-amount::before {
            content: '¥';
            font-size: 2rem;
            margin-right: 5px;
        }

        .coupon-name {
            text-align: center;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .coupon-conditions {
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .coupon-modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-coupon {
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-coupon-primary {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0a0a1a;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        .btn-coupon-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 215, 0, 0.6);
        }

        .btn-coupon-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-coupon-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .recommendations-section {
            background: linear-gradient(135deg, rgba(255, 68, 68, 0.05), rgba(255, 0, 110, 0.05));
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 68, 68, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .recommendations-section .section-title::before {
            background: linear-gradient(180deg, #ff4444, #ff006e);
        }

        .recommendation-item {
            background: rgba(255, 68, 68, 0.08);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 68, 68, 0.15);
            transition: all 0.3s ease;
        }

        .recommendation-item:hover {
            background: rgba(255, 68, 68, 0.12);
            border-color: rgba(255, 68, 68, 0.3);
        }

        .recommendation-item:last-child {
            margin-bottom: 0;
        }

        .recommendation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .recommendation-name {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .recommendation-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .recommendation-details {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            gap: 15px;
        }

        .recommendation-coupon {
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(255, 215, 0, 0.15);
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            font-size: 0.85rem;
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .recommendation-coupon .coupon-icon {
            font-size: 1.2rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 60px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .legend-color.green {
            background: radial-gradient(circle, #00ff88 0%, #00cc6a 100%);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .legend-color.yellow {
            background: radial-gradient(circle, #ffaa00 0%, #ff8800 100%);
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
        }

        .legend-color.red {
            background: radial-gradient(circle, #ff4444 0%, #ff006e 100%);
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
            animation: pulse-legend 1s infinite;
        }

        @keyframes pulse-legend {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .update-time {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🗺️ 全域电子导览与智慧客流管控</h1>
            <p class="subtitle">实时监控 · 智能分流 · 优惠券引导</p>
        </header>

        <div class="control-panel">
            <div class="control-left">
                <button class="btn btn-refresh" id="refreshBtn">
                    <span class="refresh-icon">🔄</span>
                    刷新数据
                </button>
                <div class="auto-refresh-indicator">
                    <span class="dot"></span>
                    <span>自动刷新中 (5秒)</span>
                </div>
            </div>
            <div class="control-right">
                <div class="update-time" id="updateTime">最后更新: --</div>
            </div>
        </div>

        <div class="stats-overview">
            <div class="stat-card green">
                <div class="stat-title">舒适景点</div>
                <div class="stat-value green" id="comfortableCount">0</div>
            </div>
            <div class="stat-card yellow">
                <div class="stat-title">拥挤景点</div>
                <div class="stat-value yellow" id="crowdedCount">0</div>
            </div>
            <div class="stat-card red">
                <div class="stat-title">爆满景点</div>
                <div class="stat-value red" id="fullCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">暂停服务</div>
                <div class="stat-value" id="suspendedCount">0</div>
            </div>
        </div>

        <div class="main-content">
            <div class="map-section">
                <h2 class="section-title">📍 景区热力图</h2>
                <div id="mapChart"></div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color green"></div>
                        <span>舒适 (饱和度 < 40%)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color yellow"></div>
                        <span>拥挤 (40% ≤ 饱和度 < 80%)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color red"></div>
                        <span>爆满 (饱和度 ≥ 80%)</span>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="spots-list-section">
                    <h2 class="section-title">🏛️ 景点状态列表</h2>
                    <div id="spotsList"></div>
                </div>

                <div class="recommendations-section" id="recommendationsSection" style="display: none;">
                    <h2 class="section-title">🚀 智能分流推荐</h2>
                    <div id="recommendationsList"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="coupon-modal" id="couponModal">
        <div class="coupon-modal-content">
            <button class="coupon-modal-close" id="closeCouponModal">×</button>
            <div class="coupon-modal-icon">🎁</div>
            <h3 class="coupon-modal-title" id="couponModalTitle">专属优惠来袭！</h3>
            <p class="coupon-modal-message" id="couponModalMessage">您选择的景点当前人数较多，推荐您前往周边景点，还可领取优惠券哦！</p>
            <div class="coupon-card">
                <div class="coupon-amount" id="couponAmount">10</div>
                <div class="coupon-name" id="couponName">景区通用优惠券</div>
                <div class="coupon-conditions" id="couponConditions">无门槛使用，全场通用</div>
            </div>
            <div class="coupon-modal-actions">
                <button class="btn btn-coupon btn-coupon-primary" id="acceptCouponBtn">立即领取</button>
                <button class="btn btn-coupon btn-coupon-secondary" id="skipCouponBtn">稍后再说</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        let mapChart = null;
        let autoRefreshInterval = null;
        let currentData = null;
        let shownCouponSpotIds = new Set();

        function init() {
            initMapChart();
            loadData();
            setupAutoRefresh();
            setupEventListeners();
        }

        function initMapChart() {
            const chartDom = document.getElementById('mapChart');
            mapChart = echarts.init(chartDom);
            
            window.addEventListener('resize', () => {
                mapChart.resize();
            });
        }

        async function loadData() {
            try {
                const response = await fetch(`${API_BASE_URL}/gis/heat-map`);
                if (!response.ok) {
                    throw new Error('Failed to fetch data');
                }
                
                currentData = await response.json();
                renderData(currentData);
                checkAndShowCouponModal(currentData);
                
            } catch (error) {
                console.error('Error loading data:', error);
                showErrorState();
            }
        }

        function renderData(data) {
            renderStats(data);
            renderMapChart(data);
            renderSpotsList(data);
            renderRecommendations(data);
            updateLastUpdateTime();
        }

        function renderStats(data) {
            let comfortable = 0;
            let crowded = 0;
            let full = 0;
            let suspended = 0;

            data.spots.forEach(spot => {
                if (spot.status === '暂停服务') {
                    suspended++;
                } else if (spot.color_level === 'green') {
                    comfortable++;
                } else if (spot.color_level === 'yellow') {
                    crowded++;
                } else if (spot.color_level === 'red') {
                    full++;
                }
            });

            document.getElementById('comfortableCount').textContent = comfortable;
            document.getElementById('crowdedCount').textContent = crowded;
            document.getElementById('fullCount').textContent = full;
            document.getElementById('suspendedCount').textContent = suspended;
        }

        function renderMapChart(data) {
            if (!mapChart) return;

            const validSpots = data.spots.filter(spot => 
                spot.latitude !== null && spot.longitude !== null
            );

            if (validSpots.length === 0) {
                const option = {
                    title: {
                        text: '暂无景点坐标数据',
                        left: 'center',
                        top: 'center',
                        textStyle: {
                            color: 'rgba(255, 255, 255, 0.5)',
                            fontSize: 16
                        }
                    },
                    backgroundColor: 'transparent'
                };
                mapChart.setOption(option);
                return;
            }

            const latitudes = validSpots.map(s => s.latitude);
            const longitudes = validSpots.map(s => s.longitude);
            const minLat = Math.min(...latitudes);
            const maxLat = Math.max(...latitudes);
            const minLng = Math.min(...longitudes);
            const maxLng = Math.max(...longitudes);
            const padding = 0.01;

            const scatterData = validSpots.map(spot => {
                let itemColor;
                let symbolSize;
                let itemName = spot.name;

                if (spot.status === '暂停服务') {
                    itemColor = 'rgba(128, 128, 128, 0.6)';
                    symbolSize = 30;
                    itemName += ' (暂停服务)';
                } else if (spot.color_level === 'green') {
                    itemColor = new echarts.graphic.RadialGradient(0.4, 0.3, 1, [
                        { offset: 0, color: 'rgba(0, 255, 136, 0.8)' },
                        { offset: 1, color: 'rgba(0, 204, 106, 0.4)' }
                    ]);
                    symbolSize = 40 + spot.saturation * 20;
                } else if (spot.color_level === 'yellow') {
                    itemColor = new echarts.graphic.RadialGradient(0.4, 0.3, 1, [
                        { offset: 0, color: 'rgba(255, 170, 0, 0.8)' },
                        { offset: 1, color: 'rgba(255, 136, 0, 0.4)' }
                    ]);
                    symbolSize = 50 + spot.saturation * 20;
                } else {
                    itemColor = new echarts.graphic.RadialGradient(0.4, 0.3, 1, [
                        { offset: 0, color: 'rgba(255, 68, 68, 0.9)' },
                        { offset: 1, color: 'rgba(255, 0, 110, 0.5)' }
                    ]);
                    symbolSize = 60 + spot.saturation * 20;
                }

                return {
                    name: itemName,
                    value: [spot.longitude, spot.latitude, spot.current_count, spot.capacity, spot.saturation],
                    itemStyle: {
                        color: itemColor
                    },
                    symbolSize: symbolSize,
                    spotData: spot
                };
            });

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(10, 10, 26, 0.95)',
                    borderColor: 'rgba(139, 92, 246, 0.5)',
                    borderWidth: 1,
                    textStyle: {
                        color: '#ffffff'
                    },
                    formatter: function(params) {
                        const spot = params.data.spotData;
                        const saturationPercent = (spot.saturation * 100).toFixed(1);
                        let statusText = '';
                        
                        if (spot.status === '暂停服务') {
                            statusText = '<br/><span style="color: #888888;">⚠️ 暂停服务 - 暂无工作人员在岗</span>';
                        } else if (spot.color_level === 'red') {
                            statusText = '<br/><span style="color: #ff4444;">🔴 爆满 - 建议分流</span>';
                        } else if (spot.color_level === 'yellow') {
                            statusText = '<br/><span style="color: #ffaa00;">🟡 拥挤</span>';
                        } else {
                            statusText = '<br/><span style="color: #00ff88;">🟢 舒适</span>';
                        }

                        const staffText = spot.has_staff_on_duty 
                            ? '<span style="color: #00ff88;">✅ 有工作人员在岗</span>' 
                            : '<span style="color: #888888;">❌ 暂无工作人员</span>';

                        return `
                            <div style="font-weight: 600; font-size: 14px; margin-bottom: 8px;">${spot.name}</div>
                            <div>当前人数: <span style="color: #00d2ff; font-weight: 600;">${spot.current_count}</span> / ${spot.capacity}</div>
                            <div>饱和度: <span style="color: #ffd700; font-weight: 600;">${saturationPercent}%</span></div>
                            <div>评分: ${spot.rating || '暂无'} | 票价: ¥${spot.price || 0}</div>
                            <div>${staffText}</div>
                            ${statusText}
                        `;
                    }
                },
                grid: {
                    left: '10%',
                    right: '10%',
                    top: '10%',
                    bottom: '10%'
                },
                xAxis: {
                    type: 'value',
                    min: minLng - padding,
                    max: maxLng + padding,
                    axisLine: {
                        lineStyle: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        }
                    },
                    axisLabel: {
                        color: 'rgba(255, 255, 255, 0.4)',
                        formatter: '{value}°'
                    },
                    splitLine: {
                        lineStyle: {
                            color: 'rgba(255, 255, 255, 0.05)'
                        }
                    },
                    name: '经度',
                    nameTextStyle: {
                        color: 'rgba(255, 255, 255, 0.5)'
                    }
                },
                yAxis: {
                    type: 'value',
                    min: minLat - padding,
                    max: maxLat + padding,
                    axisLine: {
                        lineStyle: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        }
                    },
                    axisLabel: {
                        color: 'rgba(255, 255, 255, 0.4)',
                        formatter: '{value}°'
                    },
                    splitLine: {
                        lineStyle: {
                            color: 'rgba(255, 255, 255, 0.05)'
                        }
                    },
                    name: '纬度',
                    nameTextStyle: {
                        color: 'rgba(255, 255, 255, 0.5)'
                    }
                },
                series: [
                    {
                        type: 'scatter',
                        coordinateSystem: 'cartesian2d',
                        data: scatterData,
                        emphasis: {
                            scale: 1.2,
                            itemStyle: {
                                shadowBlur: 20,
                                shadowColor: 'rgba(139, 92, 246, 0.5)'
                            }
                        },
                        label: {
                            show: true,
                            formatter: function(params) {
                                return params.data.spotData.name;
                            },
                            position: 'top',
                            color: 'rgba(255, 255, 255, 0.8)',
                            fontSize: 11
                        }
                    }
                ]
            };

            mapChart.setOption(option, true);
        }

        function renderSpotsList(data) {
            const container = document.getElementById('spotsList');
            
            if (data.spots.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🏛️</div>
                        <p>暂无景点数据</p>
                    </div>
                `;
                return;
            }

            const sortedSpots = [...data.spots].sort((a, b) => {
                const priority = { red: 0, yellow: 1, green: 2 };
                if (a.status === '暂停服务' && b.status !== '暂停服务') return 1;
                if (b.status === '暂停服务' && a.status !== '暂停服务') return -1;
                return priority[a.color_level] - priority[b.color_level];
            });

            container.innerHTML = sortedSpots.map(spot => {
                const saturationPercent = (spot.saturation * 100).toFixed(1);
                const badgeClass = spot.status === '暂停服务' ? 'suspended' : spot.color_level;
                const statusText = spot.status === '暂停服务' ? '暂停服务' : 
                    (spot.color_level === 'green' ? '舒适' : 
                     spot.color_level === 'yellow' ? '拥挤' : '爆满');

                return `
                    <div class="spot-item" data-spot-id="${spot.id}">
                        <div class="spot-header">
                            <span class="spot-name">${spot.name}</span>
                            <span class="spot-status-badge ${badgeClass}">${statusText}</span>
                        </div>
                        <div class="spot-details">
                            <div class="spot-detail-item">
                                <span class="spot-detail-label">当前:</span>
                                <span>${spot.current_count}/${spot.capacity}</span>
                            </div>
                            <div class="spot-detail-item">
                                <span class="spot-detail-label">饱和度:</span>
                                <span style="color: ${spot.color_level === 'green' ? '#00ff88' : spot.color_level === 'yellow' ? '#ffaa00' : '#ff4444'}">${saturationPercent}%</span>
                            </div>
                            <div class="spot-detail-item">
                                <span class="spot-detail-label">评分:</span>
                                <span>${spot.rating || '暂无'}</span>
                            </div>
                            <div class="spot-detail-item">
                                <span class="spot-detail-label">票价:</span>
                                <span>¥${spot.price || 0}</span>
                            </div>
                        </div>
                        <div class="staff-indicator">
                            <span class="staff-dot ${spot.has_staff_on_duty ? 'on-duty' : 'off-duty'}"></span>
                            <span class="staff-text">${spot.has_staff_on_duty ? '有工作人员在岗' : '暂无工作人员'}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderRecommendations(data) {
            const section = document.getElementById('recommendationsSection');
            const container = document.getElementById('recommendationsList');

            if (!data.diversion_recommendations || data.diversion_recommendations.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';

            container.innerHTML = data.diversion_recommendations.map(rec => {
                const recommendationsHtml = rec.recommended_spots.map(spot => {
                    const saturationPercent = (spot.saturation * 100).toFixed(1);
                    let couponHtml = '';
                    
                    if (rec.coupon_offer && rec.coupon_offer.target_spot_id === spot.id) {
                        couponHtml = `
                            <div class="recommendation-coupon">
                                <span class="coupon-icon">🎫</span>
                                <span>${rec.coupon_offer.message}</span>
                            </div>
                        `;
                    }

                    return `
                        <div class="recommendation-item">
                            <div class="recommendation-header">
                                <span class="recommendation-name">${spot.name}</span>
                                <span class="recommendation-badge">饱和度 ${saturationPercent}%</span>
                            </div>
                            <div class="recommendation-details">
                                <span>当前: ${spot.current_count}/${spot.capacity}</span>
                                <span>评分: ${spot.rating || '暂无'}</span>
                            </div>
                            ${couponHtml}
                        </div>
                    `;
                }).join('');

                return `
                    <div style="margin-bottom: 20px;">
                        <div style="font-size: 0.9rem; color: #ff4444; margin-bottom: 10px; font-weight: 600;">
                            🔴 ${rec.from_spot_name} 已爆满 (饱和度 ≥ 80%)
                        </div>
                        ${recommendationsHtml}
                    </div>
                `;
            }).join('');
        }

        function checkAndShowCouponModal(data) {
            if (!data.diversion_recommendations) return;

            for (const rec of data.diversion_recommendations) {
                if (rec.coupon_offer && !shownCouponSpotIds.has(rec.from_spot_id)) {
                    showCouponModal(rec.coupon_offer, rec.from_spot_name);
                    shownCouponSpotIds.add(rec.from_spot_id);
                    break;
                }
            }
        }

        function showCouponModal(couponOffer, fromSpotName) {
            const modal = document.getElementById('couponModal');
            
            document.getElementById('couponModalTitle').textContent = `${fromSpotName} 人数较多！`;
            document.getElementById('couponModalMessage').textContent = couponOffer.message;
            document.getElementById('couponAmount').textContent = couponOffer.discount_value;
            document.getElementById('couponName').textContent = couponOffer.coupon_name;
            
            let conditions = '';
            if (couponOffer.min_spend > 0) {
                conditions += `满${couponOffer.min_spend}元可用`;
            } else {
                conditions += '无门槛使用';
            }
            conditions += ` · 剩余${couponOffer.remained_stock}张`;
            document.getElementById('couponConditions').textContent = conditions;

            modal.classList.add('active');
        }

        function closeCouponModal() {
            document.getElementById('couponModal').classList.remove('active');
        }

        function updateLastUpdateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('updateTime').textContent = `最后更新: ${timeStr}`;
        }

        function showErrorState() {
            const spotsList = document.getElementById('spotsList');
            spotsList.innerHTML = `
                <div class="empty-state">
                    <div class="icon">❌</div>
                    <p>加载数据失败</p>
                    <p style="font-size: 0.85rem; margin-top: 10px;">请检查网络连接后点击刷新</p>
                </div>
            `;
        }

        function setupAutoRefresh() {
            autoRefreshInterval = setInterval(() => {
                loadData();
            }, 5000);
        }

        function setupEventListeners() {
            document.getElementById('refreshBtn').addEventListener('click', () => {
                const btn = document.getElementById('refreshBtn');
                btn.classList.add('rotating');
                loadData().then(() => {
                    setTimeout(() => {
                        btn.classList.remove('rotating');
                    }, 600);
                });
            });

            document.getElementById('closeCouponModal').addEventListener('click', closeCouponModal);
            document.getElementById('skipCouponBtn').addEventListener('click', closeCouponModal);
            
            document.getElementById('acceptCouponBtn').addEventListener('click', () => {
                alert('🎉 优惠券已领取成功！请在会员中心查看。');
                closeCouponModal();
            });

            document.getElementById('couponModal').addEventListener('click', (e) => {
                if (e.target.id === 'couponModal') {
                    closeCouponModal();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
