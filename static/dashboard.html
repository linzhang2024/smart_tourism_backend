<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧旅游 - 智能大数据分析大屏</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #00d2ff;
            --secondary-blue: #3a7bd5;
            --dark-bg: #050510;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(0, 210, 255, 0.2);
            --success-color: #00ff88;
            --warning-color: #ffaa00;
            --danger-color: #ff4444;
            --purple-glow: #8b5cf6;
            --gold-glow: #ffd700;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #050510 0%, #0a0a2e 50%, #051020 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }

        .dashboard-container {
            max-width: 1920px;
            margin: 0 auto;
            padding: 15px 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 20px;
            position: relative;
        }

        .header::before,
        .header::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-blue), transparent);
        }

        .header::before {
            left: 0;
        }

        .header::after {
            right: 0;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d2ff, #8b5cf6, #ff006e, #00d2ff);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 4s ease infinite;
            letter-spacing: 8px;
            text-shadow: 0 0 40px rgba(139, 92, 246, 0.5);
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header .subtitle {
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .header .update-time {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--primary-blue);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.05), rgba(139, 92, 246, 0.03));
            border-radius: 12px;
            padding: 18px 20px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-blue), var(--purple-glow));
        }

        .metric-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .metric-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 210, 255, 0.2);
            border-color: rgba(0, 210, 255, 0.4);
        }

        .metric-card.sales { --card-color: #00d2ff; }
        .metric-card.visitors { --card-color: #00ff88; }
        .metric-card.current { --card-color: #ffd700; }
        .metric-card.profit { --card-color: #8b5cf6; }
        .metric-card.conversion { --card-color: #ff006e; }

        .metric-card.sales::before { background: linear-gradient(90deg, #00d2ff, #3a7bd5); }
        .metric-card.visitors::before { background: linear-gradient(90deg, #00ff88, #00cc6a); }
        .metric-card.current::before { background: linear-gradient(90deg, #ffd700, #ffaa00); }
        .metric-card.profit::before { background: linear-gradient(90deg, #8b5cf6, #6366f1); }
        .metric-card.conversion::before { background: linear-gradient(90deg, #ff006e, #ff4466); }

        .metric-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .metric-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--card-color);
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .metric-value.currency::before {
            content: '¥';
            font-size: 1rem;
            margin-right: 2px;
        }

        .metric-value.percent::after {
            content: '%';
            font-size: 1rem;
        }

        .metric-trend {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            margin-top: 5px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .metric-trend.up {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
        }

        .metric-trend.down {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(0, 210, 255, 0.02));
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .chart-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--purple-glow), var(--primary-blue), var(--purple-glow));
        }

        .chart-card.full-width {
            grid-column: 1 / -1;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .chart-title {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-title::before {
            content: '';
            width: 3px;
            height: 20px;
            background: linear-gradient(180deg, var(--primary-blue), var(--purple-glow));
            border-radius: 2px;
        }

        .chart-badge {
            padding: 4px 12px;
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--primary-blue);
        }

        .chart-container {
            width: 100%;
            height: 320px;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 5, 16, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 15px;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 210, 255, 0.1);
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer .auto-refresh {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 15px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 20px;
            color: var(--success-color);
        }

        .footer .dot {
            width: 6px;
            height: 6px;
            background: var(--success-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        @media (max-width: 1400px) {
            .metrics-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 900px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .header h1 {
                font-size: 1.5rem;
                letter-spacing: 4px;
            }
        }

        .error-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: linear-gradient(135deg, rgba(255, 68, 68, 0.9), rgba(255, 68, 68, 0.8));
            color: white;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(255, 68, 68, 0.4);
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }

        .error-message.show {
            transform: translateX(0);
        }

        .error-message .error-title {
            font-weight: 600;
            margin-bottom: 3px;
        }

        .error-message .error-desc {
            font-size: 0.85rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>智慧旅游 - 智能大数据分析大屏</h1>
            <p class="subtitle">SMART TOURISM BIG DATA ANALYTICS DASHBOARD</p>
            <p class="update-time" id="updateTime">数据更新中...</p>
        </div>

        <div class="metrics-grid">
            <div class="metric-card sales">
                <div class="metric-icon">💰</div>
                <div class="metric-label">今日销售总额</div>
                <div class="metric-value currency" id="todaySales">0.00</div>
            </div>
            <div class="metric-card visitors">
                <div class="metric-icon">👥</div>
                <div class="metric-label">今日入园人数</div>
                <div class="metric-value" id="todayVisitors">0</div>
            </div>
            <div class="metric-card current">
                <div class="metric-icon">📍</div>
                <div class="metric-label">当前在园人数</div>
                <div class="metric-value" id="currentInScenic">0</div>
            </div>
            <div class="metric-card profit">
                <div class="metric-icon">📈</div>
                <div class="metric-label">本月累计利润</div>
                <div class="metric-value currency" id="monthProfit">0.00</div>
            </div>
            <div class="metric-card conversion">
                <div class="metric-icon">🎯</div>
                <div class="metric-label">会员转化率</div>
                <div class="metric-value percent" id="conversionRate">0.00</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title">近7日销售趋势</h3>
                    <span class="chart-badge">DAILY SALES TREND</span>
                </div>
                <div class="chart-container" id="salesChart">
                    <div class="loading-overlay" id="salesLoading">
                        <div class="spinner"></div>
                        <p class="loading-text">加载销售数据中...</p>
                    </div>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title">游客来源分布</h3>
                    <span class="chart-badge">TOURIST SOURCE</span>
                </div>
                <div class="chart-container" id="sourceChart">
                    <div class="loading-overlay" id="sourceLoading">
                        <div class="spinner"></div>
                        <p class="loading-text">加载来源数据中...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="auto-refresh">
                <span class="dot"></span>
                <span>自动刷新: 每60秒</span>
                <span id="countdown">下次刷新: 60秒</span>
            </div>
        </div>
    </div>

    <div class="error-message" id="errorMessage">
        <div class="error-title">数据获取失败</div>
        <div class="error-desc" id="errorDesc">请检查网络连接</div>
    </div>

    <script>
        const API_BASE_URL = '';
        let authToken = localStorage.getItem('authToken') || '';
        let salesChart = null;
        let sourceChart = null;
        let countdownInterval = null;
        let countdownSeconds = 60;

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            document.getElementById('errorDesc').textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 5000);
        }

        async function apiRequest(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }

            try {
                const response = await fetch(url, {
                    ...options,
                    headers
                });

                if (response.status === 401) {
                    localStorage.removeItem('authToken');
                    authToken = '';
                    const token = await getAuthToken();
                    if (token) {
                        return apiRequest(url, options);
                    }
                    throw new Error('认证失败，请重新登录');
                }

                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.detail || `HTTP ${response.status}`);
                }

                return response.json();
            } catch (error) {
                console.error('API请求错误:', error);
                throw error;
            }
        }

        async function getAuthToken() {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    authToken = data.access_token;
                    localStorage.setItem('authToken', authToken);
                    return authToken;
                }
            } catch (error) {
                console.error('自动登录失败:', error);
            }
            return null;
        }

        async function loadOverview() {
            try {
                const data = await apiRequest(`${API_BASE_URL}/analytics/overview`);
                
                document.getElementById('todaySales').textContent = data.today_sales_total.toFixed(2);
                document.getElementById('todayVisitors').textContent = data.today_visitor_count.toLocaleString();
                document.getElementById('currentInScenic').textContent = data.current_in_scenic_count.toLocaleString();
                document.getElementById('monthProfit').textContent = data.month_total_profit.toFixed(2);
                document.getElementById('conversionRate').textContent = data.member_conversion_rate.toFixed(2);
                
                const updateTime = new Date(data.updated_at);
                document.getElementById('updateTime').textContent = 
                    `数据更新时间: ${updateTime.toLocaleString('zh-CN')}`;
                
                return true;
            } catch (error) {
                console.error('加载概览数据失败:', error);
                showError('概览数据加载失败: ' + error.message);
                return false;
            }
        }

        async function loadSalesTrend() {
            const loadingEl = document.getElementById('salesLoading');
            try {
                loadingEl.classList.remove('hidden');
                
                const data = await apiRequest(`${API_BASE_URL}/analytics/sales-trend`);
                
                if (!salesChart) {
                    salesChart = echarts.init(document.getElementById('salesChart'));
                }

                const dates = data.data.map(item => item.date.slice(5));
                const orders = data.data.map(item => item.order_count);
                const incomes = data.data.map(item => item.income);

                const option = {
                    tooltip: {
                        trigger: 'axis',
                        backgroundColor: 'rgba(10, 10, 30, 0.95)',
                        borderColor: 'rgba(0, 210, 255, 0.3)',
                        borderWidth: 1,
                        textStyle: { color: '#fff' },
                        formatter: function(params) {
                            let result = params[0].axisValue + '<br/>';
                            params.forEach(param => {
                                const value = param.seriesName === '收入(元)' 
                                    ? '¥' + param.value.toLocaleString()
                                    : param.value + ' 单';
                                result += `${param.marker} ${param.seriesName}: ${value}<br/>`;
                            });
                            return result;
                        }
                    },
                    legend: {
                        data: ['订单量', '收入(元)'],
                        textStyle: { color: 'rgba(255, 255, 255, 0.7)' },
                        top: 0
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        top: '15%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: dates,
                        axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } },
                        axisLabel: { color: 'rgba(255, 255, 255, 0.6)' }
                    },
                    yAxis: [
                        {
                            type: 'value',
                            name: '订单量',
                            axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } },
                            axisLabel: { color: 'rgba(255, 255, 255, 0.6)' },
                            splitLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.05)' } }
                        },
                        {
                            type: 'value',
                            name: '收入(元)',
                            axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } },
                            axisLabel: { color: 'rgba(255, 255, 255, 0.6)' },
                            splitLine: { show: false }
                        }
                    ],
                    series: [
                        {
                            name: '订单量',
                            type: 'bar',
                            data: orders,
                            itemStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: '#00d2ff' },
                                    { offset: 1, color: '#3a7bd5' }
                                ])
                            },
                            emphasis: {
                                itemStyle: {
                                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                        { offset: 0, color: '#00ff88' },
                                        { offset: 1, color: '#00d2ff' }
                                    ])
                                }
                            }
                        },
                        {
                            name: '收入(元)',
                            type: 'line',
                            yAxisIndex: 1,
                            data: incomes,
                            smooth: true,
                            symbol: 'circle',
                            symbolSize: 8,
                            lineStyle: {
                                width: 3,
                                color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                                    { offset: 0, color: '#ff006e' },
                                    { offset: 1, color: '#8b5cf6' }
                                ])
                            },
                            itemStyle: {
                                color: '#ff006e',
                                borderColor: '#fff',
                                borderWidth: 2
                            },
                            areaStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: 'rgba(255, 0, 110, 0.3)' },
                                    { offset: 1, color: 'rgba(255, 0, 110, 0.05)' }
                                ])
                            }
                        }
                    ]
                };

                salesChart.setOption(option, true);
                loadingEl.classList.add('hidden');
                return true;
            } catch (error) {
                console.error('加载销售趋势失败:', error);
                loadingEl.classList.add('hidden');
                showError('销售趋势数据加载失败: ' + error.message);
                return false;
            }
        }

        async function loadTouristSource() {
            const loadingEl = document.getElementById('sourceLoading');
            try {
                loadingEl.classList.remove('hidden');
                
                const data = await apiRequest(`${API_BASE_URL}/analytics/tourist-source`);
                
                if (!sourceChart) {
                    sourceChart = echarts.init(document.getElementById('sourceChart'));
                }

                const colors = ['#00d2ff', '#00ff88', '#ffd700', '#ff006e', '#8b5cf6'];
                
                const option = {
                    tooltip: {
                        trigger: 'item',
                        backgroundColor: 'rgba(10, 10, 30, 0.95)',
                        borderColor: 'rgba(0, 210, 255, 0.3)',
                        borderWidth: 1,
                        textStyle: { color: '#fff' },
                        formatter: '{b}: {c}人 ({d}%)'
                    },
                    legend: {
                        orient: 'vertical',
                        left: '5%',
                        top: 'center',
                        textStyle: { color: 'rgba(255, 255, 255, 0.7)' }
                    },
                    series: [
                        {
                            name: '游客来源',
                            type: 'pie',
                            radius: ['40%', '70%'],
                            center: ['60%', '50%'],
                            avoidLabelOverlap: false,
                            itemStyle: {
                                borderRadius: 10,
                                borderColor: '#050510',
                                borderWidth: 3
                            },
                            label: {
                                show: true,
                                position: 'outside',
                                color: 'rgba(255, 255, 255, 0.8)',
                                formatter: '{b}\n{d}%'
                            },
                            emphasis: {
                                label: {
                                    show: true,
                                    fontSize: 16,
                                    fontWeight: 'bold',
                                    color: '#fff'
                                },
                                itemStyle: {
                                    shadowBlur: 20,
                                    shadowOffsetX: 0,
                                    shadowColor: 'rgba(0, 210, 255, 0.5)'
                                }
                            },
                            labelLine: {
                                show: true,
                                lineStyle: { color: 'rgba(255, 255, 255, 0.3)' }
                            },
                            data: data.data.map((item, index) => ({
                                value: item.count,
                                name: item.source,
                                itemStyle: { color: colors[index % colors.length] }
                            }))
                        }
                    ]
                };

                sourceChart.setOption(option, true);
                loadingEl.classList.add('hidden');
                return true;
            } catch (error) {
                console.error('加载游客来源失败:', error);
                loadingEl.classList.add('hidden');
                showError('游客来源数据加载失败: ' + error.message);
                return false;
            }
        }

        async function refreshAllData() {
            countdownSeconds = 60;
            
            await Promise.all([
                loadOverview(),
                loadSalesTrend(),
                loadTouristSource()
            ]);
        }

        function startCountdown() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }
            
            countdownInterval = setInterval(() => {
                countdownSeconds--;
                document.getElementById('countdown').textContent = 
                    `下次刷新: ${countdownSeconds}秒`;
                
                if (countdownSeconds <= 0) {
                    refreshAllData();
                }
            }, 1000);
        }

        function handleResize() {
            if (salesChart) {
                salesChart.resize();
            }
            if (sourceChart) {
                sourceChart.resize();
            }
        }

        window.addEventListener('resize', handleResize);

        (async function init() {
            await getAuthToken();
